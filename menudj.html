<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>pizza_Djafoura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="config.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent; /* إزالة لون النقر الأزرق في الموبايل */
    }

    :root {
      --primary: #e63946;
      --primary-dark: #c1121f;
      --primary-light: #ff6b6b;
      --accent: #ffd166;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --surface: #0f3460;
      --card: rgba(255, 255, 255, 0.06);
      --card-hover: rgba(255, 255, 255, 0.1);
      --text: #f0f0f0;
      --text-muted: #aaa;
      --border: rgba(255, 255, 255, 0.1);
      --success: #06d6a0;
      --warning: #ffd166;
      --radius: 16px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      /* مساحة كافية للنافبار السفلية */
      padding-bottom: calc(64px + env(safe-area-inset-bottom) + 20px); 
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, var(--dark2) 0%, var(--surface) 100%);
      padding: 8px 14px 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      position: relative; /* لتثبيت العناصر المطلقة بداخله */
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(230, 57, 70, 0.4);
      overflow: hidden;
      font-weight: 900;
      flex-shrink: 0;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-name {
      font-size: 19px;
      font-weight: 900;
      color: #fff;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: -2px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px; /* مسافة كافية لعدم تداخل البحث */
      flex-shrink: 0;
      position: relative;
      z-index: 110; /* فوق البحث */
    }

    /* تعديل تموضع شارة النقاط */
    .points-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      border-radius: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: var(--dark);
      border: 2px solid var(--dark2); /* حدود لتغطية الأيقونة تحتها */
      font-size: 9px;
      font-weight: 900;
      z-index: 115;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      cursor: pointer;
      transition: var(--transition);
      font-size: 15px;
      flex-shrink: 0;
      position: relative;
      touch-action: manipulation; /* تحسين استجابة اللمس */
    }

    .btn-icon:hover,
    .btn-icon:focus {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ===== SEARCH BAR WRAPPER ===== */
    .search-bar-wrap {
      position: relative;
      margin-bottom: 12px;
      z-index: 100;
    }

    .search-bar {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-bar input {
      width: 100%;
      padding: 10px 42px 10px 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      outline: none;
      transition: var(--transition);
      text-align: right;
      box-sizing: border-box;
    }

    .search-bar input:focus {
      border-color: var(--primary);
      background: var(--card-hover);
      box-shadow: 0 0 0 2px rgba(230, 57, 70, 0.12);
    }

    .search-bar input::placeholder {
      color: var(--text-muted);
      font-size: 13px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
      z-index: 2;
      transition: color .3s;
    }

    .search-bar input:focus ~ .search-icon {
      color: var(--primary);
    }

    .search-bar input:focus ~ .search-clear {
      opacity: 1;
    }

    .search-clear {
      position: absolute;
      left: 36px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      opacity: 0;
      transition: opacity .2s;
      z-index: 2;
      padding: 4px;
      line-height: 1;
    }

    /* ===== OFFERS BANNER ===== */
    .offers-banner {
      background: linear-gradient(90deg, var(--primary-dark), var(--primary), var(--primary-light));
      padding: 10px 20px;
      overflow: hidden;
      position: relative;
    }

    .offers-scroll {
      display: flex;
      gap: 30px;
      animation: scroll-offers 20s linear infinite;
      white-space: nowrap;
    }

    @keyframes scroll-offers {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .offer-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    /* ===== CATEGORIES ===== */
    .categories-wrap {
      padding: 0 20px 14px;
      background: var(--dark2);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .categories-wrap::-webkit-scrollbar {
      display: none;
    }

    .categories {
      display: flex;
      gap: 8px;
      width: max-content;
    }

    .cat-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-muted);
      min-width: 64px;
      font-family: 'Cairo', sans-serif;
      touch-action: manipulation;
    }

    .cat-btn i {
      font-size: 15px;
    }

    .cat-btn span {
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .cat-btn:hover,
    .cat-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 3px 10px rgba(230, 57, 70, 0.3);
      transform: translateY(-1px);
    }

    /* ===== PRODUCTS GRID ===== */
    .content {
      padding: 20px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
      margin-right: 8px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); /* أعمدة أصغر للموبايل */
      gap: 14px; /* مسافة أقل للشاشات الصغيرة */
    }

    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
      cursor: pointer;
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: rgba(230, 57, 70, 0.3);
      background: var(--card-hover);
    }

    .product-card.unavailable {
      opacity: 0.5;
      pointer-events: none;
    }

    .product-img {
      aspect-ratio: 4 / 3;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      background: rgba(255, 255, 255, 0.03);
      position: relative;
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
    }

    .product-info {
      padding: 12px; /* تقليل الحواف */
    }

    .product-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .product-price {
      font-size: 15px;
      font-weight: 900;
      color: var(--accent);
    }

    .product-price span {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .add-btn {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: var(--transition);
      touch-action: manipulation;
    }

    /* ===== CART FAB ===== */
    .cart-fab {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom)); /* رفعه فوق شريط الهاتف */
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      width: 100%;
      max-width: 600px; /* توسيط داخل الشاشات الكبيرة */
      padding: 0 20px;
    }

    .cart-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 12px 28px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 25px rgba(230, 57, 70, 0.5);
      transition: var(--transition);
      white-space: nowrap;
      width: 100%;
    }

    .cart-count {
      background: #fff;
      color: var(--primary);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(60px + env(safe-area-inset-bottom));
      background: var(--dark2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 150;
      padding-bottom: env(safe-area-inset-bottom); /* دعم iPhone notch */
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      padding: 8px 12px;
      border-radius: 12px;
      flex: 1;
    }

    .nav-item i {
      font-size: 20px;
    }

    .nav-item span {
      font-size: 10px;
      font-weight: 600;
    }

    .nav-item.active,
    .nav-item:hover {
      color: var(--primary);
    }

    /* ===== MODALS ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 300;
      display: flex;
      align-items: flex-end; /* من الأسفل للموبايل */
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--dark2);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px 20px;
      border: 1px solid var(--border);
      border-bottom: none;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      background: var(--card);
      border: none;
      border-radius: 50%;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: var(--transition);
    }

    /* Common styles for other elements... */
    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .cart-item-image-wrap {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
    }

    .cart-item-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      display: block;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-size: 14px;
      font-weight: 700;
    }

    .cart-item-price {
      font-size: 13px;
      color: var(--accent);
      margin-top: 2px;
    }

    .qty-ctrl {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border-radius: 12px;
      padding: 4px 8px;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .qty-btn:hover {
      background: var(--primary-dark);
    }

    .qty-num {
      font-weight: 700;
      font-size: 15px;
      min-width: 20px;
      text-align: center;
    }

    .cart-note-input {
      width: 100%;
      margin-top: 8px;
      padding: 8px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      outline: none;
      transition: var(--transition);
      text-align: right;
      resize: none;
    }

    .cart-note-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(230, 57, 70, 0.15);
    }

    .cart-summary {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      margin-top: 20px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 14px;
      color: var(--text-muted);
    }

    .summary-row.total {
      font-size: 18px;
      font-weight: 900;
      color: var(--accent);
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      outline: none;
      transition: var(--transition);
      text-align: right;
    }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.15);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(230, 57, 70, 0.5);
    }

.btn-primary:disabled {
       opacity: 0.5;
       cursor: not-allowed;
       transform: none;
     }

    .btn-success {
       background: linear-gradient(135deg, var(--success), #34d399);
       color: #fff;
       box-shadow: 0 4px 15px rgba(6, 214, 160, 0.4);
     }

    .btn-success:hover {
       transform: translateY(-2px);
       box-shadow: 0 8px 20px rgba(6, 214, 160, 0.5);
     }

     .btn-secondary {
      background: var(--card);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .status-tracker {
      padding: 10px 0;
    }

    .status-steps {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin-bottom: 20px;
    }

    .status-steps::before {
      content: '';
      position: absolute;
      top: 20px;
      right: 10%;
      left: 10%;
      height: 2px;
      background: var(--border);
    }

    .status-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 1;
      flex: 1;
    }

    .step-icon {
      width: 40px;
      height: 40px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: var(--transition);
    }

    .step-label {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }

    .status-step.done .step-icon {
      background: var(--success);
      border-color: var(--success);
    }

    .status-step.active .step-icon {
      background: var(--primary);
      border-color: var(--primary);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(230, 57, 70, 0); }
    }

.loyalty-card {
       background: linear-gradient(135deg, var(--surface), var(--dark2));
       border: 1px solid rgba(255, 209, 102, 0.3);
       border-radius: var(--radius);
       padding: 20px;
       margin-bottom: 20px;
       position: relative;
       overflow: hidden;
     }

     .loyalty-points {
       font-size: 48px;
       font-weight: 900;
       color: var(--accent);
       line-height: 1;
     }

     .loyalty-level-badge {
       display: inline-flex;
       align-items: center;
       gap: 6px;
       padding: 6px 12px;
       border-radius: 20px;
       font-size: 13px;
       font-weight: 700;
       margin-top: 10px;
     }

     .progress-bar {
       height: 8px;
       background: var(--card);
       border-radius: 4px;
       overflow: hidden;
       margin-top: 14px;
     }

     .progress-fill {
       height: 100%;
       background: linear-gradient(90deg, var(--primary), var(--accent));
       border-radius: 4px;
       transition: width 0.3s;
     }

     .progress-label {
       display: flex;
       justify-content: space-between;
       font-size: 11px;
       color: var(--text-muted);
       margin-top: 6px;
     }

     .rewards-grid {
       display: grid;
       grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
       gap: 12px;
       margin-top: 12px;
     }

     .reward-item {
       background: var(--card);
       border: 1px solid var(--border);
       border-radius: 12px;
       padding: 12px;
       text-align: center;
       transition: var(--transition);
     }

     .reward-item.unlocked {
       border-color: var(--success);
       background: rgba(6, 214, 160, 0.1);
     }

     .reward-icon {
       font-size: 24px;
       display: block;
       margin-bottom: 6px;
     }

     .reward-pts {
       font-size: 12px;
       font-weight: 700;
       color: var(--accent);
       margin-bottom: 4px;
     }

     .reward-name {
       font-size: 11px;
       color: var(--text);
     }

     .customer-info-grid {
       display: grid;
       grid-template-columns: 1fr 1fr;
       gap: 10px;
       margin-bottom: 16px;
     }

     .info-box {
       background: var(--card);
       border: 1px solid var(--border);
       border-radius: 10px;
       padding: 10px;
       text-align: center;
     }

     .info-box-value {
       font-size: 18px;
       font-weight: 900;
       color: var(--accent);
     }

     .info-box-label {
       font-size: 11px;
       color: var(--text-muted);
       margin-top: 4px;
     }

     .success-anim {
      text-align: center;
      padding: 20px 0;
    }

    .success-icon {
      font-size: 70px;
      display: block;
      animation: bounceIn 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    @keyframes bounceIn {
      0% { transform: scale(0) rotate(-10deg); }
      60% { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1) rotate(0); }
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      top: 20px;
      top: calc(20px + env(safe-area-inset-top)); /* تحت النوتش */
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--dark2);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      z-index: 1000;
      border: 1px solid var(--border);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 8px;
      width: 90%;
      max-width: 400px;
      justify-content: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

@keyframes spin {
       to { transform: rotate(360deg); }
     }

     .loader {
       width: 70px;
       aspect-ratio: 1;
       background:
         radial-gradient(farthest-side,#ffa516 90%,#0000) center/16px 16px,
         radial-gradient(farthest-side,#4ade80 90%,#0000) bottom/12px 12px;
       background-repeat: no-repeat;
       animation: l17 1s infinite linear;
       position: relative;
       margin: auto;
     }
     .loader::before {
       content:"";
       position: absolute;
       width: 8px;
       aspect-ratio: 1;
       inset: auto 0 16px;
       margin: auto;
       background: var(--text-muted);
       border-radius: 50%;
       transform-origin: 50% calc(100% + 10px);
       animation: inherit;
       animation-duration: 0.5s;
     }
     @keyframes l17 {
       100%{transform: rotate(1turn)}
     }

     .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .hidden {
      display: none !important;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .header { padding: 8px 10px 10px; }
      .products-grid {
        grid-template-columns: repeat(2, 1fr); /* عمودين فقط في الموبايل الصغير */
        gap: 10px;
      }
      .product-img { min-height: 110px; }
      .product-name { font-size: 13px; }
      .product-info { padding: 10px; }
    }

    @media (min-width: 600px) {
      .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      }
      .modal {
        border-radius: 24px;
        margin: auto;
        max-height: 85vh;
      }
      .modal-overlay {
        align-items: center;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-logo" data-restaurant-logo>Dj</div>
        <div>
          <div class="brand-name" id="headerName" data-restaurant-name>pizza_Djafoura</div>
          <div class="brand-sub" id="tableLabel">اختر طاولتك</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-icon loyalty-action" onclick="openLoyalty()" title="نقاطي">
          <i class="fas fa-star"></i>
          <span id="pointsBadge" class="points-badge">0</span>
        </button>
          <button class="btn-icon" onclick="openOrderTrack()" title="تتبع طلبي" id="trackBtn" style="display:none"></button>
        </div>
    </div>

    <!-- OFFERS BANNER -->
    <div class="offers-banner" id="offersBanner" style="display:none">
      <div class="offers-scroll" id="offersScroll"></div>
    </div>

    <!-- SEARCH BAR -->
    <div class="search-bar-wrap">
      <div class="search-bar">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" placeholder="ابحث في القائمة..." oninput="filterProducts()">
        <button class="search-clear" id="searchClearBtn" onclick="clearSearchBar()" style="display:none" type="button">
          <i class="fas fa-times-circle"></i>
        </button>
      </div>
    </div>

    <!-- CATEGORIES -->
    <div class="categories-wrap">
      <div class="categories" id="categoriesContainer"></div>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="content">
    <div class="section-title" id="sectionTitle">
      <i class="fas fa-fire" style="color:var(--primary)"></i>
      <span>قائمة الطعام</span>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </main>

  <!-- CART FAB -->
  <div class="cart-fab">
    <button class="cart-btn hidden" id="cartBtn" onclick="openCart()">
      <i class="fas fa-shopping-cart"></i>
      <span>عرض السلة</span>
      <div class="cart-count" id="cartCount">0</div>
      <span id="cartTotal" style="color:var(--accent)">0 دج</span>
    </button>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="showTab('menu')">
      <i class="fas fa-utensils"></i>
      <span>القائمة</span>
    </div>
    <div class="nav-item" onclick="openLoyalty()">
      <i class="fas fa-crown"></i>
      <span>نقاطي</span>
    </div>
    <div class="nav-item" onclick="openOrderTrack()" id="trackNav">
      <i class="fas fa-receipt"></i>
      <span>طلبي</span>
    </div>
  </nav>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ===== CART MODAL ===== -->
  <div class="modal-overlay" id="cartModal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">
        <span>🛒 سلة الطلبات</span>
        <button class="close-btn" onclick="closeModal('cartModal')"><i class="fas fa-times"></i></button>
      </div>
      <div id="cartItems"></div>
      <div id="cartSummaryWrap"></div>
      <div style="margin-top:16px; display:flex; flex-direction:column; gap:10px;">
        <button class="btn btn-primary" id="checkoutBtn" onclick="startCheckout()">
          <i class="fas fa-paper-plane"></i> إرسال الطلب
        </button>
        <button class="btn btn-secondary" onclick="closeModal('cartModal')">
          <i class="fas fa-arrow-right"></i> متابعة التسوق
        </button>
      </div>
    </div>
  </div>

  <!-- ===== REGISTER MODAL ===== -->
  <div class="modal-overlay" id="registerModal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">
        <span>👤 تسجيل بياناتك</span>
        <button class="close-btn" onclick="closeModal('registerModal')"><i class="fas fa-times"></i></button>
      </div>
      <p style="color:var(--text-muted); font-size:13px; margin-bottom:20px;">
        سجّل مرة واحدة فقط واستمتع بنظام النقاط والمكافآت! 🎁
      </p>
      <div class="form-group">
        <label class="form-label">الاسم الكامل</label>
        <input class="form-input" id="regName" placeholder="مثال: أحمد محمد" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">رقم الهاتف</label>
        <input class="form-input" id="regPhone" placeholder="05xxxxxxxx" type="tel">
      </div>
      <button class="btn btn-primary" id="registerBtn" onclick="submitRegister()">
        <i class="fas fa-check"></i> تسجيل وإرسال الطلب
      </button>
    </div>
  </div>

  <!-- ===== SUCCESS MODAL ===== -->
  <div class="modal-overlay" id="successModal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="success-anim">
        <span class="success-icon">🎉</span>
        <h2 style="font-size:22px; margin:12px 0 8px; font-weight:900;">تم إرسال طلبك!</h2>
        <p style="color:var(--text-muted); font-size:14px;" id="successMsg">نقاطك في الطريق...</p>
        <div
          style="background:var(--card); border-radius:14px; padding:16px; margin:16px 0; display:inline-block; min-width:200px;">
          <div style="font-size:13px; color:var(--text-muted);">رقم طلبك</div>
          <div style="font-size:28px; font-weight:900; color:var(--accent);" id="orderIdDisplay">#000</div>
          <div style="font-size:12px; color:var(--text-muted); margin-top:4px;" id="tableDisplay"></div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="closeModal('successModal'); openOrderTrack()">
        <i class="fas fa-eye"></i> تتبع الطلب
      </button>
      <button class="btn btn-secondary" style="margin-top:10px" onclick="closeModal('successModal'); location.reload()">
        <i class="fas fa-plus"></i> طلب جديد
      </button>
    </div>
  </div>

<!-- ===== ORDER TRACK MODAL ===== -->
   <div class="modal-overlay" id="trackModal">
     <div class="modal">
       <div class="modal-handle"></div>
       <div class="modal-title">
         <span>📋 تتبع الطلب</span>
         <button class="close-btn" onclick="closeModal('trackModal')"><i class="fas fa-times"></i></button>
       </div>
       <div id="trackContent"></div>
     </div>
   </div>

   <!-- ===== DELIVERED MODAL ===== -->
   <div class="modal-overlay" id="deliveredModal">
     <div class="modal">
       <div class="modal-handle"></div>
       <div class="modal-title">
         <span>🎉 تم التسليم</span>
         <button class="close-btn" onclick="closeDeliveredModal()"><i class="fas fa-times"></i></button>
       </div>
       <div id="deliveredContent"></div>
     </div>
   </div>

   <!-- ===== LOYALTY MODAL ===== -->
  <div class="modal-overlay" id="loyaltyModal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">
        <span>🏆 نقاط الولاء</span>
        <button class="close-btn" onclick="closeLoyaltyModal()"><i class="fas fa-times"></i></button>
      </div>
      <div id="loyaltyContent"></div>
    </div>
  </div>

  <script src="menudj.js"></script>
</body>

</html>
